name: Daily Stock Data Update (CZSC Format)

on:
  schedule:
    # 每天美东时间晚上 17:00 运行 (相当于 UTC 21:00) 确保美股已收盘
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    # 允许手动触发
    inputs:
      manual_trigger:
        description: 'Manual Trigger'
        required: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 启用 pip 缓存，大幅加速后续依赖安装

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch stock data
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python us_data_fetcher.py

      - name: Run CZSC Analysis
        run: python run_czsc_analysis.py

      - name: Fetch news
        run: python news_fetcher.py

      - name: Commit and push to data-sync branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 切换到数据专用分支（不存在时自动新建孤立分支）
          git checkout -B data-sync
          git add data/
          git commit -m "Auto-update: data & signals $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          # 强制推送到 data-sync（仅数据分支，main 不受影响）
          git push origin data-sync --force
