<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CZSC 量化平台 · Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div class="app-background">
    <div class="app-glass-container">
      
      <!-- Sidebar -->
      <aside class="glass-sidebar">
        <div class="sidebar-top">
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=ZJ&background=3498db&color=fff&rounded=true" alt="User">
          </div>
          
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="symbolSearch" placeholder="搜索标单/代码..." oninput="onSearchInput(this.value)" onfocus="onSearchFocus()">
            <div id="searchDropdown" class="search-dropdown" style="display: none;"></div>
          </div>

          <!-- Permanent Strategy Panel -->
          <div id="strategyPanel" class="strategy-panel">
            <div class="strategy-list-item">
              <span class="sl-name" onclick="openStrategyOverlay()"><i class="fas fa-microchip"></i> 缠论 (配置详情)</span>
              <label class="sl-switch" title="在图表上显示该策略的指标线">
                <input type="checkbox" id="toggleChanlunBtn" checked onchange="toggleChanlunIndicators(this.checked)">
                <span class="sl-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Panel -->
      <main class="glass-main">
        <header class="main-header">
          <div class="header-left">
             <span id="headerSymbolName" class="header-ticker">Apple Inc. (AAPL)</span>
          </div>
          <div class="header-right">
            <i class="far fa-user-circle"></i>
            <i class="far fa-bell"></i>
          </div>
        </header>

        <!-- Stats Row -->
        <div class="stats-cards">
          <div class="stat-card">
            <div class="s-label">Price</div>
            <div class="s-val" id="qPrice">$--</div>
            <div class="s-sub" id="qSubPrice">--</div>
          </div>
          <div class="stat-card">
            <div class="s-label">Change</div>
            <div class="s-val" id="qChg">--</div>
            <div class="s-sub">Today</div>
          </div>
          <div class="stat-card">
            <div class="s-label">24h High</div>
            <div class="s-val" id="qHigh">--</div>
          </div>
          <div class="stat-card">
            <div class="s-label">24h Low</div>
            <div class="s-val" id="qLow">--</div>
          </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
          <div class="chart-toolbar">
            <div class="tf-selector">
              <button id="tf1m" class="tf-btn active" onclick="switchTF('1m', this)">分时</button>
              <button id="tf5d" class="tf-btn" onclick="switchTF('5d', this)">5日</button>
              <button id="tf1d" class="tf-btn" onclick="switchTF('1d', this)">日K</button>
              <button id="tf1wk" class="tf-btn" onclick="switchTF('1wk', this)">周K</button>
              <button id="tf1mo" class="tf-btn" onclick="switchTF('1mo', this)">月K</button>
              <button id="tf3mo" class="tf-btn" onclick="switchTF('3mo', this)">季K</button>
              <button id="tf1y" class="tf-btn" onclick="switchTF('1y', this)">年K</button>
            </div>
            <div class="chart-info-strip">
               <div class="mas-info">
                 <span class="c-ema">EMA(20): ---</span>
                 <span class="c-sma">SMA(50): ---</span>
               </div>
               <div class="trade-btns">
                 <button class="btn btn-buy">BUY</button>
                 <button class="btn btn-sell">SELL</button>
               </div>
            </div>
          </div>

          <div id="tabChart" class="chart-wrapper">
              <div id="errorBox" style="display:none;"></div>
              <div id="chartContainer"></div>
              <div id="loadingOverlay" class="loading-overlay" style="display:none;">
                <div class="loader-glow"></div>
              </div>
          </div>

          <!-- Strategy Config Overlay -->
          <div id="strategyOverlay" class="strategy-overlay">
            <div class="so-header">
              <h2><i class="fas fa-microchip"></i> 缠论策略配置与回测</h2>
              <button class="so-close-btn" onclick="closeStrategyOverlay()"><i class="fas fa-times"></i></button>
            </div>
            <div class="so-content">

              <!-- Left: Parameters Panel -->
              <div class="so-params">
                <h3>策略参数</h3>
                <div class="sp-item">
                    <label>包含处理</label>
                    <select id="s-inclusion">
                        <option value="1">开启 (ON)</option>
                        <option value="0">关闭 (OFF)</option>
                    </select>
                </div>
                <div class="sp-item">
                    <label>笔类型</label>
                    <select id="s-bi-type">
                        <option value="old">简单笔</option>
                        <option value="new" selected>标准笔</option>
                    </select>
                </div>
                <div class="sp-item">
                    <label>中枢跨度</label>
                    <input type="number" id="s-zn-span" value="5" min="3">
                </div>
                <div class="sp-item checkbox-item">
                    <label>信号过滤</label>
                    <input type="checkbox" id="s-filter" checked>
                </div>

                <h3 class="bt-section-title">回测配置</h3>
                <div class="sp-item">
                    <label>开始日期</label>
                    <input type="date" id="bt-start-date" value="2023-01-01">
                </div>
                <div class="sp-item">
                    <label>结束日期</label>
                    <input type="date" id="bt-end-date">
                </div>
                <div class="sp-item">
                    <label>初始资金 ($)</label>
                    <input type="number" id="bt-capital" value="100000" min="1000" step="10000">
                </div>
                <div class="sp-item">
                    <label>手续费率 (%)</label>
                    <input type="number" id="bt-commission" value="0.1" min="0" max="5" step="0.01">
                </div>
                <div class="sp-item">
                    <label>交易方向</label>
                    <select id="bt-direction">
                        <option value="long_only">仅做多</option>
                        <option value="both">双向 (多/空)</option>
                        <option value="short_only">仅做空</option>
                    </select>
                </div>

                <button class="backtest-btn" id="backtestRunBtn" onclick="runBacktest()">
                    <i class="fas fa-play"></i> 开始回测
                </button>
                <div id="bt-loading" style="display: none; color: #00F5D4; font-size: 0.85rem; padding: 10px; margin-top: 5px; text-align: center; border-radius: 4px; background: rgba(0, 245, 212, 0.1); border: 1px solid rgba(0, 245, 212, 0.3);">
                    <i class="fas fa-spinner fa-spin" style="margin-right: 5px;"></i> 正在调用 Python 引擎进行底层信号计算...<br><span style="opacity:0.8; font-size: 0.75rem;">(预计耗时 1~2 分钟，请耐心等待)</span>
                </div>
              </div>

              <!-- Right: Results Panel -->
              <div class="so-results" id="backtestResults">
                <div class="sr-empty">
                  <i class="fas fa-chart-line" style="font-size:2rem;margin-bottom:10px;opacity:0.4;"></i>
                  <div>配置左侧参数后点击</div>
                  <div><strong>"开始回测"</strong>查看真实分析结果</div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
