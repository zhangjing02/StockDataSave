<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CZSC 美股量化分析平台</title>
  <meta name="description" content="基于缠中说禅理论的美股/加密货币高精度K线分析平台" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">📈 CZSC · 美股量化</div>
      <div class="market-status">
        <span class="dot" id="marketDot"></span>
        <span id="marketStatusText">加载中...</span>
      </div>
    </div>
    <nav class="header-right">
      <button class="nav-btn active" id="btnChart" onclick="switchTab('Chart')">K 线图</button>
      <button class="nav-btn" id="btnNews" onclick="switchTab('News')">新闻早报</button>
    </nav>
  </header>

  <!-- Main Layout -->
  <main class="main-layout">

    <!-- Control Bar (replaces sidebar) -->
    <div class="control-bar">
      <!-- Category Tabs -->
      <div class="cat-tabs">
        <button class="cat-btn active" id="catStock" onclick="switchCategory('stock')">📊 股票</button>
        <button class="cat-btn" id="catEtf" onclick="switchCategory('etf')">🏛️ ETF</button>
        <button class="cat-btn" id="catCrypto" onclick="switchCategory('crypto')">₿ 加密币</button>
      </div>

      <!-- Symbol Selector -->
      <div class="select-wrap">
        <select id="symbolSelect" onchange="onSymbolChange(this.value)">
          <option value="">选择标的...</option>
        </select>
      </div>

      <!-- Timeframe -->
      <div class="tf-group">
        <button class="tf-btn active" id="tf5m" onclick="switchTF('5m', this)">5m</button>
        <button class="tf-btn" id="tf1d" onclick="switchTF('1d', this)">日K</button>
        <button class="tf-btn" id="tf1wk" onclick="switchTF('1wk', this)">周K</button>
        <button class="tf-btn" id="tf1mo" onclick="switchTF('1mo', this)">月K</button>
        <button class="tf-btn" id="tf3mo" onclick="switchTF('3mo', this)">季K</button>
      </div>

      <!-- Quick Stats Bar -->
      <div class="quick-stats">
        <div class="stat-chip">
          <span class="stat-label">现价</span>
          <span class="stat-val" id="qPrice">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">涨跌幅</span>
          <span class="stat-val" id="qChg">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">最高</span>
          <span class="stat-val" id="qHigh">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">最低</span>
          <span class="stat-val" id="qLow">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">成交量</span>
          <span class="stat-val" id="qVol">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">条数</span>
          <span class="stat-val" id="qCount">—</span>
        </div>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">

      <!-- Chart Tab -->
      <div id="tabChart" class="tab-panel active">
        <div id="chartContainer"></div>
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">正在加载行情数据...</div>
        </div>
        <div class="error-box" id="errorBox" style="display:none;"></div>
      </div>

      <!-- News Tab -->
      <div id="tabNews" class="tab-panel">
        <div class="news-header">
          <h2>📰 美股新闻早报</h2>
          <div class="news-date-selector">
            <label>选择日期：</label>
            <input type="date" id="newsDateInput" onchange="loadNews(this.value)" />
          </div>
        </div>
        <div id="newsContent" class="news-content">
          <div class="news-loading">正在加载新闻...</div>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
